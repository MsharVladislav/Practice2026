<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Lab - Визуальный Анализатор</title>
    
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/animations.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
    <script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>
</head>
<body>
    <canvas id="bgCanvas"></canvas>

    <div class="container relative-content">
        <header class="main-header">
            <div class="logo">Audio<span>Lab</span></div>
            <p>Профессиональный анализ акустических характеристик трека</p>
        </header>

        <section class="upload-section">
            <form id="uploadForm">
                <div id="dropZone" class="drop-zone">
                    <div class="drop-zone-content">
                        <svg class="upload-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/></svg>
                        <span class="drop-zone-prompt">Перетащите аудиофайл сюда или нажмите</span>
                        <span class="file-name" id="fileNameDisplay">Файл не выбран</span>
                    </div>
                    <input type="file" id="audioFile" name="file" accept=".wav,.mp3,.ogg,.flac" required>
                </div>
                <button type="submit" id="submitBtn" class="btn-primary" disabled>Проанализировать</button>
            </form>
            
            <div id="loading" class="hidden">
                <div class="spinner"></div>
                <p>Нейросети Librosa вычисляют параметры...</p>
            </div>
            <div id="errorBox" class="hidden error-message"></div>
        </section>

        <section id="resultsSection" class="hidden dashboard">
            
            <div class="dash-col-left">
                <div class="card bpm-card">
                    <div class="card-header">Темп (BPM)</div>
                    <div class="bpm-display">
                        <span id="bpmValue">--</span>
                        <span class="bpm-unit">уд/мин</span>
                    </div>
                </div>

                <div class="card player-card">
                    <div class="card-header">Управление плеером</div>
                    <div class="controls">
                        <button id="playPauseBtn" class="btn-player">
                            <span id="playIcon">▶️</span>
                            <span id="pauseIcon" class="hidden">⏸️</span>
                        </button>
                    </div>
                </div>
            </div>

            <div class="dash-col-right">
                <div class="card chart-card no-padding">
                    <div class="card-header with-padding">Волновая форма (Waveform)</div>
                    <div id="waveform"></div>
                </div>

                <div class="card chart-card no-padding">
                    <div class="card-header with-padding">Мел-спектрограмма</div>
                    <div id="spectrogramChart"></div>
                </div>

                <div class="card chart-card no-padding">
                    <div class="card-header with-padding">MFCC коэффициенты</div>
                    <div id="mfccChart"></div>
                </div>
            </div>
            
        </section>
    </div>

    <script src="/static/js/particles.js"></script> <script src="/static/js/script.js"></script>
</body>
</html>
